# -----------------------------
# Connectivity & Resources
# -----------------------------
listen_addresses = '*'          # Required for Docker networking
# max_connections = 100           # Enough for 8 threads + PMM + overhead
# shared_buffers = 256MB          # 25% of 1GB RAM (standard dev target)
# work_mem = 16MB                 # Faster sorts/joins for 8 threads

# -----------------------------
# Extensions (The Performance "Eyes")
# -----------------------------
shared_preload_libraries = 'pg_stat_monitor,pg_stat_statements,pg_prewarm'

# -----------------------------
# Statistics & Monitoring
# -----------------------------
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
pg_stat_monitor.pgsm_histogram_min = 0.1
pg_stat_monitor.pgsm_histogram_max = 10.0
pg_stat_monitor.pgsm_histogram_buckets = 5
pg_stat_monitor.pgsm_bucket_time = 60

# -----------------------------
# Logging
# -----------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql.log'
log_rotation_size = 10MB	
log_truncate_on_rotation = on
debug_pretty_print = on
log_line_prefix = '%m [%p] tx[%x] '		
log_lock_waits = on			
log_statement = 'all'



# -----------------------------
# Write Ahead Log (WAL)
# -----------------------------
# Helps prevent "WALWrite" bottlenecks during your UPDATE test
# wal_level = logical             # Good for modern tools
# checkpoint_timeout = 15min
# max_wal_size = 1GB
# min_wal_size = 80MB
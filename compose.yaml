x-postgres-env: &postgres-env
  POSTGRES_DB: ${DB_NAME:-postgres}
  POSTGRES_USER: ${DB_USER:-postgres}
  POSTGRES_PASSWORD: ${DB_PASSWORD:-welcome123}

x-db-env: &db-env
  DB_NAME: ${DB_NAME:-postgres}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-welcome123}

networks:
  default:
    driver: bridge

volumes:               
  postgres-data:
  system-data:

services:
  postgres:
    container_name: postgres
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [default]
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      <<: *postgres-env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/sql/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
  postgres-system:
    container_name: postgres-system
    image: postgres:17
    restart: unless-stopped
    networks: [default]
    ports:
      - "5433:5432"
    environment:
      <<: *postgres-env
    volumes:
      - system-data:/var/lib/postgresql/data
      - ./postgres/sql/init-sysb.sql:/docker-entrypoint-initdb.d/init-sysb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pmm-server:
    image: percona/pmm-server:2
    container_name: pmm-server
    networks: [default]
    ports:
      - "8080:80"

  pmm-client:
    image: percona/pmm-client:2
    container_name: pmm-client
    networks: [default]
    environment:
      <<: *db-env
      PMM_SERVER: ${PMM_SERVER:-pmm-server}
      PMM_USER: ${PMM_USER:-admin}
      PMM_PASS: ${PMM_PASS:-admin}
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      pmm-admin config --server-address=$$PMM_SERVER:80 --server-user=$$PMM_USER --server-password=$$PMM_PASS;
      pmm-admin add postgresql --username=$$DB_USER --password=$$DB_PASSWORD --host=$$DB_HOST --query-source=pgstatmonitor;
      pmm-agent"
    depends_on:
      - postgres
      - pmm-server
  sysbench-prepare:
    container_name: sysbench-prepare
    build:
      context: ./sysbench
      dockerfile: Dockerfile
    image: syspg/sysbench:latest
    networks: [default]
    environment:
      <<: *db-env
    volumes:
      - ./sysbench:/app
    command: ["python", "prepare.py", "-t", "oltp_read_write"]
    depends_on:
      postgres:
        condition: service_healthy
  sysbench-run:
    container_name: sysbench-run
    build:
      context: ./sysbench
      dockerfile: Dockerfile
    image: syspg/sysbench:latest
    networks: [default]
    environment:
      <<: *db-env
    volumes:
      - ./sysbench:/app
    command: ["python", "run.py", "-t", "oltp_read_write"]
    depends_on:
      postgres:
        condition: service_healthy
      pmm-client:
        condition: service_started
      sysbench-prepare:
        condition: service_completed_successfully
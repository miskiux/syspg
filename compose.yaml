x-postgres-env: &postgres-env
  POSTGRES_DB: ${DB_NAME:-postgres}
  POSTGRES_USER: ${DB_USER:-postgres}
  POSTGRES_PASSWORD: ${DB_PASSWORD:-welcome123}

x-db-env: &db-env
  DB_NAME: ${DB_NAME:-postgres}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-welcome123}

networks:
  default:
    driver: bridge

volumes:               
  pgdata:
  systemdata:
  pgadmindata:
  grafanadata:
  prometheusdata:

services:
  postgres:
    container_name: postgres
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [default]
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      <<: *postgres-env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/sql/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
  postgres-system:
    container_name: postgres-system
    image: postgres:17
    restart: unless-stopped
    networks: [default]
    ports:
      - "5433:5432"
    environment:
      <<: *postgres-env
    volumes:
      - systemdata:/var/lib/postgresql/data
      - ./postgres/sql/init-sysb.sql:/docker-entrypoint-initdb.d/init-sysb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sysbench-prepare:
    container_name: sysbench-prepare
    build:
      context: ./sysbench
      dockerfile: Dockerfile
    image: syspg/sysbench:latest
    networks: [default]
    environment:
      <<: *db-env
    volumes:
      - ./sysbench:/app
    command: ["python", "prepare.py", "-t", "oltp_read_write"]
    depends_on:
      postgres:
        condition: service_healthy
  sysbench-run:
    container_name: sysbench-run
    build:
      context: ./sysbench
      dockerfile: Dockerfile
    image: syspg/sysbench:latest
    networks: [default]
    environment:
      <<: *db-env
    volumes:
      - ./sysbench:/app
    command: ["python", "run.py", "-t", "oltp_read_write"]
    depends_on:
      postgres:
        condition: service_healthy
      sysbench-prepare:
        condition: service_completed_successfully

  postgres_exporter:
    container_name: postgres_exporter
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    networks: [default]
    ports:
      - "9187:9187"
    volumes:
      - ./monitor/queries.yaml:/etc/postgres_exporter/queries.yaml
    command:
      - "--extend.query-path=/etc/postgres_exporter/queries.yaml"
    environment:
      - DATA_SOURCE_NAME=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - PG_EXPORTER_AUTO_DISCOVER_DATABASES=true
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    networks: [default]
    ports:
      - "9090:9090"
    volumes:
     - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
     - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1d'
      - '--web.enable-lifecycle'
    depends_on:
      - postgres_exporter

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    networks: [default]
    user: "0"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitor/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitor/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

  pgadmin:  
    container_name: pgadmin    
    image: dpage/pgadmin4:9.11.0
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=changeme
    ports:
      - "5050:80"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    networks: [default]
    depends_on:
      postgres:
        condition: service_healthy
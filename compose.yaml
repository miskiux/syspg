networks:
  syspgnet:
    driver: bridge

volumes:               
  postgres-data:
  postgres-system-data:

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    networks: [syspgnet]
    ports:
      - "543:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-welcome123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sysbench/config/sql/init-ext.sql:/docker-entrypoint-initdb.d/init-ext.sql
    # temp 
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements,pg_prewarm"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
  postgres-system:
    image: postgres:17
    restart: unless-stopped
    networks: [syspgnet]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-welcome123}
    volumes:
      - system-pgdata:/var/lib/postgresql/data
      - ./sysbench/config/sql/init-syssb.sql:/docker-entrypoint-initdb.d/init-syssb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
  sysbench-prepare:
    build:
      context: ./sysbench
      dockerfile: Dockerfile
    image: syspg/sysbench:latest
    networks: [syspgnet]
    environment: &env
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-welcome123}
      - DB_HOST=postgres
      - DB_PORT=5432
    volumes:
      - ./config/params:/params
    command: ["python", "prepare.py", "-t", "oltp_read_write"]
    depends_on:
      postgres:
        condition: service_healthy
  sysbench-run:
    build:
      context: ./sysbench
      dockerfile: Dockerfile
    image: syspg/sysbench:latest
    networks: [syspgnet]
    environment: &env
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-welcome123}
      - DB_HOST=postgres
      - DB_PORT=5432
    volumes:
      - ./sysbench/config/params:/params
      - ./sysbench/output:/output
    command: ["python", "run.py", "-t", "oltp_read_write"]
    depends_on:
      postgres:
        condition: service_healthy
      sysbench-prepare:
        condition: service_completed_successfully